<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>전문가 퍼소나 인터뷰 랩</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #ffffff;
      --ink: #162033;
      --muted: #647084;
      --line: #dfe5ee;
      --primary: #2457c5;
      --primary-dark: #173f95;
      --green: #0f766e;
      --red: #b42318;
      --amber: #92400e;
      --shadow: 0 10px 28px rgba(22, 32, 51, .07);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.45;
    }
    header {
      padding: 22px 28px;
      color: #fff;
      background: #172033;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 18px;
      align-items: center;
    }
    header h1 { margin: 0 0 5px; font-size: 24px; letter-spacing: 0; }
    header p { margin: 0; color: #c9d3e4; font-size: 14px; }
    main {
      width: min(1240px, calc(100% - 32px));
      margin: 18px auto 56px;
      display: grid;
      grid-template-columns: 390px minmax(0, 1fr);
      gap: 16px;
    }
    section {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 16px;
      margin-bottom: 14px;
    }
    h2 { margin: 0 0 12px; font-size: 17px; }
    h3 { margin: 16px 0 8px; font-size: 14px; }
    label { display: block; margin: 10px 0 5px; font-size: 13px; font-weight: 650; color: #334155; }
    input, textarea, select {
      width: 100%;
      border: 1px solid #cbd5e1;
      border-radius: 7px;
      padding: 10px 11px;
      font: inherit;
      background: #fff;
      color: var(--ink);
    }
    textarea { min-height: 74px; resize: vertical; }
    button {
      border: 0;
      border-radius: 7px;
      padding: 10px 13px;
      font-weight: 750;
      cursor: pointer;
      background: #263244;
      color: #fff;
      white-space: nowrap;
    }
    button:hover { filter: brightness(.96); }
    button:disabled { opacity: .55; cursor: not-allowed; }
    button.primary { background: var(--primary); }
    button.green { background: var(--green); }
    button.secondary { background: #e2e8f0; color: #172033; }
    button.red { background: var(--red); }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .row > * { flex: 1; min-width: 0; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .hint { color: var(--muted); font-size: 13px; }
    .status {
      padding: 10px;
      border-radius: 7px;
      background: #f1f5f9;
      color: #334155;
      font-size: 13px;
      margin-top: 10px;
    }
    .good { color: var(--green); }
    .danger { color: var(--red); }
    .warn { color: var(--amber); }
    .bar { height: 10px; background: #e2e8f0; border-radius: 999px; overflow: hidden; margin-top: 8px; }
    .bar > div { height: 100%; width: 0%; background: var(--primary); transition: width .2s; }
    .persona-list { display: grid; gap: 8px; margin-top: 10px; }
    .persona-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfdff;
    }
    .persona-item strong { display: block; margin-bottom: 3px; }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin: 10px 0; }
    .tab {
      border: 1px solid var(--line);
      background: #eef2f7;
      color: #1f2937;
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 13px;
      cursor: pointer;
    }
    .tab.active { background: #172033; color: #fff; border-color: #172033; }
    .messages {
      min-height: 390px;
      max-height: 610px;
      overflow: auto;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fafc;
    }
    .msg {
      background: #fff;
      border: 1px solid var(--line);
      border-left: 4px solid #94a3b8;
      border-radius: 8px;
      padding: 11px;
      margin: 9px 0;
      white-space: pre-wrap;
    }
    .msg.ai { border-left-color: var(--primary); }
    .msg.summary { border-left-color: var(--green); }
    .meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }
    .usage { margin-top: 8px; color: var(--muted); font-size: 12px; }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
      margin-top: 10px;
    }
    .compact { font-size: 12px; color: var(--muted); }
    @media (max-width: 940px) {
      header { grid-template-columns: 1fr; }
      main { grid-template-columns: 1fr; }
    }
    @media (max-width: 620px) {
      .grid2, .toolbar { grid-template-columns: 1fr; }
      header { padding: 18px; }
      main { width: calc(100% - 20px); }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>전문가 퍼소나 인터뷰 랩</h1>
      <p>전문 영역의 지식, 가치관, 이해관계, 판단 규칙을 가진 가상 전문가를 만들고 인터뷰합니다.</p>
    </div>
    <div class="compact" id="modelInfo">설정 불러오는 중</div>
  </header>

  <main>
    <aside>
      <section>
        <h2>1. 입장과 예산</h2>
        <label for="displayName">이름 또는 별칭</label>
        <input id="displayName" placeholder="예: 2학년 3반 05번" />
        <label for="accessCode">수업 코드 <span class="hint">필요한 경우</span></label>
        <input id="accessCode" placeholder="teacher code" />
        <button class="primary" id="enterBtn">입장</button>
        <div class="status" id="creditBox">입장하면 크레딧이 표시됩니다.</div>
        <div class="bar"><div id="creditProgress"></div></div>
      </section>

      <section>
        <h2>2. 회의 만들기</h2>
        <label for="title">회의 제목</label>
        <input id="title" value="AI 분류 체계의 사회적 타당성 검토" />
        <label for="topic">주제</label>
        <textarea id="topic">AI가 사람이나 상황을 분류할 때 어떤 지식이 드러나고 어떤 지식이 사라지는지, 그리고 그 분류가 사회적으로 타당한지 검토한다.</textarea>
        <div class="grid2">
          <div>
            <label for="meetingType">회의 종류</label>
            <select id="meetingType"></select>
          </div>
          <div>
            <label for="place">상황</label>
            <input id="place" value="수업 토론" />
          </div>
        </div>
        <button class="green" id="createSessionBtn">회의 시작</button>
        <div class="status" id="sessionInfo">회의를 시작하세요.</div>
      </section>

      <section>
        <h2>3. 전문가 퍼소나 생성</h2>
        <label for="templateSelect">빠른 템플릿</label>
        <select id="templateSelect"></select>
        <label for="pName">이름</label>
        <input id="pName" />
        <label for="pRole">역할/사회적 위치</label>
        <textarea id="pRole"></textarea>
        <label for="pExpertise">전문 영역과 경험</label>
        <textarea id="pExpertise"></textarea>
        <label for="pKnowledge">인터뷰에서 사용할 지식</label>
        <textarea id="pKnowledge"></textarea>
        <label for="pValues">중시 가치와 이해관계</label>
        <textarea id="pValues"></textarea>
        <label for="pRules">판단 규칙</label>
        <textarea id="pRules"></textarea>
        <label for="pStyle">말하기 방식과 한계</label>
        <input id="pStyle" />
        <button id="addPersonaBtn">퍼소나 추가</button>
        <div class="persona-list" id="personaList"></div>
      </section>
    </aside>

    <section>
      <div class="row">
        <div>
          <h2>4. 인터뷰</h2>
          <div class="hint">공동 대화장에서는 패널처럼, 개별 탭에서는 1:1 심층면접처럼 질문합니다.</div>
        </div>
        <button class="secondary" id="refreshBtn">새로고침</button>
      </div>

      <div class="grid2">
        <div>
          <label for="depthSelect">응답 깊이와 비용</label>
          <select id="depthSelect">
            <option value="economy">경제형: 짧게, 비용 최소</option>
            <option value="balanced" selected>균형형: 수업용 기본</option>
            <option value="deep">심화형: 더 깊게, 비용 증가</option>
          </select>
        </div>
        <div>
          <label for="questionPreset">질문 프리셋</label>
          <select id="questionPreset">
            <option value="">직접 입력</option>
            <option value="이 주제에서 당신의 전문 지식으로 가장 먼저 확인해야 할 쟁점은 무엇입니까?">핵심 쟁점 묻기</option>
            <option value="당신의 가치관과 이해관계 때문에 특히 민감하게 보는 부분은 무엇입니까?">가치/이해관계 묻기</option>
            <option value="이 주장 중 사실, 추정, 가치 판단, 검증 필요 항목을 나눠 주세요.">근거 분해하기</option>
            <option value="다른 퍼소나의 관점에 동의하기 어려운 지점과 그 이유를 말해 주세요.">관점 충돌 만들기</option>
          </select>
        </div>
      </div>

      <div class="tabs" id="tabs"></div>
      <div class="messages" id="messages"></div>

      <div class="toolbar">
        <div>
          <label id="inputLabel" for="messageInput">공동 대화장에 입력</label>
          <textarea id="messageInput" placeholder="예: 각 퍼소나는 이 분류 체계가 어떤 지식을 강화하고 어떤 지식을 지우는지 말해 주세요."></textarea>
        </div>
        <div class="row">
          <button class="primary" id="sendBtn">발언 요청</button>
          <button class="green" id="summaryBtn">요약 생성</button>
          <button class="secondary" id="exportBtn">Markdown</button>
        </div>
      </div>
      <div class="status" id="usageBox">사용량과 예상 비용이 여기에 표시됩니다.</div>
    </section>
  </main>

<script>
let config = null;
let student = JSON.parse(localStorage.getItem("pp_student") || "null");
let session = JSON.parse(localStorage.getItem("pp_session") || "null");
let personas = [];
let messages = [];
let activeTab = "shared";

const $ = (id) => document.getElementById(id);
const templates = [
  {
    label: "분류 타당성 감사관",
    name: "분류 타당성 감사관",
    role: "AI 분류 체계가 어떤 사회적 효과와 배제 위험을 갖는지 검토하는 전문가",
    expertise: "분류 기준 설계, 설명 가능성, 이의제기 절차, 교육 현장 맥락",
    knowledge: "정확도만으로 타당성을 보장할 수 없으며, 분류명과 기준은 사람의 자기이해와 제도 접근성에 영향을 준다.",
    values: "공정성, 설명 가능성, 이의제기권, 낙인 방지",
    rules: "사실과 가치 판단을 분리하고, 분류가 누구에게 불리한지 반드시 묻는다.",
    style: "분석적이고 신중하게 말하며, 자료가 부족하면 검증 필요라고 표시한다."
  },
  {
    label: "데이터 검증자",
    name: "데이터 검증자",
    role: "모델 응답의 사실, 추정, 가치 판단을 구분하는 검증 담당자",
    expertise: "데이터 품질 점검, 편향 탐지, 근거 확인 절차",
    knowledge: "확인 가능한 사실과 확인 불가능한 추정은 분리해야 하며, 근거 없는 수치와 출처는 사용하면 안 된다.",
    values: "진실성, 재현 가능성, 투명성",
    rules: "주장마다 근거 수준을 묻고, 검증 경로가 없으면 결론 강도를 낮춘다.",
    style: "짧고 단호하게 말하되 불확실성을 숨기지 않는다."
  },
  {
    label: "이해관계자 대변자",
    name: "이해관계자 대변자",
    role: "정책이나 서비스가 학생, 교사, 보호자, 행정 담당자에게 다르게 받아들여지는 방식을 보는 전문가",
    expertise: "교육 커뮤니케이션, 현장 수용성, 이해관계 조정",
    knowledge: "같은 메시지도 집단별로 기대와 우려가 다르며, 수용 조건을 확인해야 한다.",
    values: "사용성, 공정한 참여, 신뢰 형성",
    rules: "집단별 기대, 우려, 반발 가능성을 나누어 말한다.",
    style: "현장감 있게 말하지만 실제 여론조사 결과처럼 단정하지 않는다."
  },
  {
    label: "혁신 질문자",
    name: "혁신 질문자",
    role: "기존 분류와 문제 설정 자체를 의심하고 다른 대안을 묻는 전문가",
    expertise: "문제 재정의, 대안 설계, 창의적 평가 기준",
    knowledge: "분류를 더 정교하게 만드는 것보다 분류하지 않아도 되는 조건을 찾는 것이 더 나을 때가 있다.",
    values: "가능성, 인간 중심성, 제도 유연성",
    rules: "기존 틀을 강화하기 전에 틀 자체의 필요성과 부작용을 묻는다.",
    style: "질문 중심으로 말하고, 실행 불가능한 구호만 제안하지 않는다."
  }
];

function escapeHtml(s) {
  return String(s || "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
}

async function api(path, opts = {}) {
  const res = await fetch(path, {
    headers: { "Content-Type": "application/json" },
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || "요청 실패");
  return data;
}

function setStatus(text, cls = "") {
  $("usageBox").innerHTML = `<span class="${cls}">${escapeHtml(text)}</span>`;
}

function saveState() {
  localStorage.setItem("pp_student", JSON.stringify(student));
  localStorage.setItem("pp_session", JSON.stringify(session));
}

function renderCredit(remaining) {
  if (!student) return;
  const limit = student.credit_limit || config?.creditBudget || 30000;
  const used = student.credits_used || 0;
  const left = remaining ?? Math.max(0, limit - used);
  const pct = Math.min(100, Math.max(0, (used / limit) * 100));
  $("creditBox").innerHTML = `사용자: <b>${escapeHtml(student.display_name)}</b><br>사용: ${used.toLocaleString()} / ${limit.toLocaleString()} credits<br>남음: ${left.toLocaleString()} credits`;
  $("creditProgress").style.width = `${pct}%`;
}

function renderMeetingTypes() {
  $("meetingType").innerHTML = Object.entries(config.meetingTypes)
    .map(([key, label]) => `<option value="${key}">${escapeHtml(label)}</option>`)
    .join("");
  $("meetingType").value = "classification_audit";
}

function applyTemplate(t) {
  $("pName").value = t.name;
  $("pRole").value = t.role;
  $("pExpertise").value = t.expertise;
  $("pKnowledge").value = t.knowledge;
  $("pValues").value = t.values;
  $("pRules").value = t.rules;
  $("pStyle").value = t.style;
}

function renderTemplates() {
  $("templateSelect").innerHTML = templates.map((t, i) => `<option value="${i}">${escapeHtml(t.label)}</option>`).join("");
  applyTemplate(templates[0]);
}

function renderPersonas() {
  $("personaList").innerHTML = personas.length
    ? personas.map((p) => `<div class="persona-item"><strong>${escapeHtml(p.name)}</strong><div class="hint">${escapeHtml(p.role)}</div></div>`).join("")
    : '<div class="hint">아직 퍼소나가 없습니다.</div>';
  const tabs = [{ id: "shared", name: "공동 대화장" }, ...personas.map((p) => ({ id: p.id, name: p.name }))];
  $("tabs").innerHTML = tabs.map((t) => `<button class="tab ${activeTab === t.id ? "active" : ""}" data-id="${t.id}">${escapeHtml(t.name)}</button>`).join("");
  document.querySelectorAll(".tab").forEach((el) => {
    el.onclick = () => {
      activeTab = el.dataset.id;
      renderPersonas();
      renderMessages();
    };
  });
}

function renderMessages() {
  const list = activeTab === "shared"
    ? messages.filter((m) => m.channel === "공동 대화장" || m.channel === "요약본" || m.channel === "개별 질문" || m.model === null)
    : messages.filter((m) => m.persona_id === activeTab || m.channel === "개별 질문");
  $("messages").innerHTML = list.length
    ? list.map((m) => {
      const cls = m.channel === "요약본" ? "summary" : (m.model ? "ai" : "student");
      const usage = m.credits_charged
        ? `<div class="usage">차감 ${m.credits_charged} credits · 입력 ${m.tokens_in} / 출력 ${m.tokens_out} · ${escapeHtml(m.model || "")}</div>`
        : "";
      return `<div class="msg ${cls}"><div class="meta"><span>${escapeHtml(m.speaker)} · ${escapeHtml(m.channel)}</span><span>${new Date(m.created_at).toLocaleString()}</span></div>${escapeHtml(m.content)}${usage}</div>`;
    }).join("")
    : '<div class="hint">아직 회의록이 없습니다.</div>';
  const persona = personas.find((p) => p.id === activeTab);
  $("inputLabel").textContent = activeTab === "shared" ? "공동 대화장에 입력" : `${persona?.name || "퍼소나"}에게 개별 질문`;
  $("messages").scrollTop = $("messages").scrollHeight;
}

async function loadSession() {
  if (!session) return;
  const data = await api(`/api/sessions/${session.id}`);
  session = data.session;
  personas = data.personas || [];
  messages = data.messages || [];
  saveState();
  $("sessionInfo").textContent = `진행 중: ${session.title} · 라운드 ${session.round_count}`;
  renderPersonas();
  renderMessages();
}

function updateModelInfo() {
  $("modelInfo").textContent = `기본 ${config.defaultModel} · 요약 ${config.summaryModel} · 심화 ${config.premiumModel}`;
}

async function init() {
  config = await api("/api/config");
  renderMeetingTypes();
  renderTemplates();
  updateModelInfo();
  if (student) renderCredit();
  if (session) await loadSession();
  if (!config.hasOpenAiKey) setStatus("OPENAI_API_KEY가 없어 현재는 모의 응답으로 실행됩니다. 모의 응답은 크레딧을 차감하지 않습니다.", "warn");
}

$("templateSelect").onchange = (e) => applyTemplate(templates[Number(e.target.value)]);
$("questionPreset").onchange = (e) => {
  if (e.target.value) $("messageInput").value = e.target.value;
};

$("enterBtn").onclick = async () => {
  try {
    const data = await api("/api/students", {
      method: "POST",
      body: { displayName: $("displayName").value, accessCode: $("accessCode").value }
    });
    student = data.student;
    saveState();
    renderCredit(data.remainingCredits);
    setStatus("입장 완료", "good");
  } catch (e) {
    setStatus(e.message, "danger");
  }
};

$("createSessionBtn").onclick = async () => {
  try {
    if (!student) throw new Error("먼저 입장하세요.");
    const data = await api("/api/sessions", {
      method: "POST",
      body: {
        studentId: student.id,
        title: $("title").value,
        topic: $("topic").value,
        meetingType: $("meetingType").value,
        place: $("place").value,
        startedAt: new Date().toISOString()
      }
    });
    session = data.session;
    personas = [];
    messages = [];
    activeTab = "shared";
    saveState();
    await loadSession();
    setStatus("회의가 시작되었습니다. 이제 전문가 퍼소나를 추가하세요.", "good");
  } catch (e) {
    setStatus(e.message, "danger");
  }
};

$("addPersonaBtn").onclick = async () => {
  try {
    if (!student || !session) throw new Error("입장하고 회의를 먼저 시작하세요.");
    await api(`/api/sessions/${session.id}/personas`, {
      method: "POST",
      body: {
        studentId: student.id,
        name: $("pName").value,
        role: $("pRole").value,
        expertise: $("pExpertise").value,
        knowledge: $("pKnowledge").value,
        valuesText: $("pValues").value,
        rules: $("pRules").value,
        style: $("pStyle").value
      }
    });
    await loadSession();
    setStatus("퍼소나가 추가되었습니다.", "good");
  } catch (e) {
    setStatus(e.message, "danger");
  }
};

$("sendBtn").onclick = async () => {
  try {
    if (!student || !session) throw new Error("입장하고 회의를 먼저 시작하세요.");
    const content = $("messageInput").value.trim();
    if (!content) throw new Error("메시지를 입력하세요.");
    $("sendBtn").disabled = true;
    setStatus("응답 생성 중입니다.");
    const body = {
      studentId: student.id,
      content,
      depth: $("depthSelect").value,
      mode: activeTab === "shared" ? "shared" : "persona",
      personaId: activeTab === "shared" ? null : activeTab
    };
    const data = await api(`/api/sessions/${session.id}/message`, { method: "POST", body });
    student = data.student;
    saveState();
    renderCredit(data.remainingCredits);
    $("messageInput").value = "";
    await loadSession();
    const dry = data.usage.dryRun ? " · 모의 응답" : "";
    setStatus(`차감 ${data.usage.credits} credits · 약 ${Math.round(data.usage.krw).toLocaleString()}원 추정 · 입력 ${data.usage.inputTokens}, 출력 ${data.usage.outputTokens}${dry}`, "good");
  } catch (e) {
    setStatus(e.message, "danger");
  } finally {
    $("sendBtn").disabled = false;
  }
};

$("summaryBtn").onclick = async () => {
  try {
    if (!student || !session) throw new Error("입장하고 회의를 먼저 시작하세요.");
    $("summaryBtn").disabled = true;
    setStatus("요약 생성 중입니다.");
    const data = await api(`/api/sessions/${session.id}/summary`, { method: "POST", body: { studentId: student.id } });
    student = data.student;
    saveState();
    renderCredit(data.remainingCredits);
    await loadSession();
    const dry = data.usage.dryRun ? " · 모의 응답" : "";
    setStatus(`요약 차감 ${data.usage.credits} credits · 약 ${Math.round(data.usage.krw).toLocaleString()}원 추정${dry}`, "good");
  } catch (e) {
    setStatus(e.message, "danger");
  } finally {
    $("summaryBtn").disabled = false;
  }
};

$("refreshBtn").onclick = () => loadSession().catch((e) => setStatus(e.message, "danger"));
$("exportBtn").onclick = () => {
  if (session) window.open(`/api/sessions/${session.id}/export.md`, "_blank");
};

init().catch((e) => setStatus(e.message, "danger"));
</script>
</body>
</html>
